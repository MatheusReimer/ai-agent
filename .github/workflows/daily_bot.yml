name: Polymarket Bot — Daily Run

on:
  schedule:
    - cron: "0 7 * * *"   # 07:00 UTC = 04:00 BRT (UTC-3)
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot (auto mode)
        env:
          GEMINI_API_KEY:            ${{ secrets.GEMINI_API_KEY }}
          POLYMARKET_KEY:            ${{ secrets.POLYMARKET_KEY }}
          POLYMARKET_PROXY_ADDRESS:  ${{ secrets.POLYMARKET_PROXY_ADDRESS }}
          PURCHASE_PASSKEY:          ${{ secrets.PURCHASE_PASSKEY }}
          GMAIL_USER:                ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:        ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_TO:                  ${{ secrets.EMAIL_TO }}
        run: python main.py --auto

      - name: Commit updated bet history
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add bet_history.json
          git diff --cached --quiet || git commit -m "chore: update bet_history [skip ci]"
          git push
